name: 寻艺数据抓取

on:
  schedule:
    # 北京时间 6:00-22:00 每2小时 (UTC: 22,0,2,4,6,8,10,12,14)
    - cron: '0 22,0,2,4,6,8,10,12,14 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 抓取寻艺数据
        run: node scripts/fetch-rankings.js

      - name: 自动提交更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '📊 自动抓取: 寻艺点赞数据更新'
          file_pattern: 'data/rankings.json'
          commit_user_name: 'GitHub Actions'
          commit_user_email: 'actions@github.com'
