<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FAF7F2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="每日打卡">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23C8956C'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white'>✅</text></svg>">
  <link rel="manifest" href="manifest.json">
  <title>每日打卡</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ---- 登录页专属样式 ---- */
    .auth-page {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-bottom: 0;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo .logo-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 8px;
    }

    .auth-logo h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
    }

    .auth-logo p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .auth-card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border-radius: var(--radius-xl);
      padding: 28px 24px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 24px;
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: 4px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-muted);
      background: none;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .auth-tab.active {
      background: var(--card);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .auth-submit {
      margin-top: 8px;
    }

    .auth-message {
      text-align: center;
      padding: 10px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-size: 0.85rem;
      font-weight: 600;
      display: none;
    }

    .auth-message.visible {
      display: block;
    }

    .auth-message.error {
      background: var(--danger-light);
      color: var(--danger);
    }

    .auth-message.success {
      background: var(--success-light);
      color: var(--success);
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="auth-page">
    <!-- Logo -->
    <div class="auth-logo">
      <span class="logo-icon">✅</span>
      <h1>每日打卡</h1>
      <p>坚持每一天，遇见更好的自己</p>
    </div>

    <!-- 登录/注册卡片 -->
    <div class="auth-card">
      <!-- Tab 切换 -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" id="tabLogin">登 录</button>
        <button class="auth-tab" data-tab="register" id="tabRegister">注 册</button>
      </div>

      <!-- 提示消息 -->
      <div class="auth-message" id="authMessage"></div>

      <!-- 登录表单 -->
      <form class="auth-form active" id="formLogin" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="loginUsername">用户名</label>
          <input class="form-input" type="text" id="loginUsername"
                 placeholder="请输入用户名" maxlength="20" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">密码</label>
          <input class="form-input" type="password" id="loginPassword"
                 placeholder="请输入密码" minlength="6" maxlength="30" required>
        </div>
        <button class="btn btn-primary btn-block btn-lg auth-submit" type="submit" id="btnLogin">
          登 录
        </button>
      </form>

      <!-- 注册表单 -->
      <form class="auth-form" id="formRegister" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="regUsername">用户名</label>
          <input class="form-input" type="text" id="regUsername"
                 placeholder="2-20 个字符" minlength="2" maxlength="20" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword">密码</label>
          <input class="form-input" type="password" id="regPassword"
                 placeholder="至少 6 位密码" minlength="6" maxlength="30" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword2">确认密码</label>
          <input class="form-input" type="password" id="regPassword2"
                 placeholder="再次输入密码" minlength="6" maxlength="30" required>
        </div>
        <button class="btn btn-primary btn-block btn-lg auth-submit" type="submit" id="btnRegister">
          注 册
        </button>
      </form>
    </div>

    <p class="auth-footer" id="authFooter">🛡️ 演示模式 · 数据存储在本地浏览器</p>
    <p class="auth-footer" style="margin-top:4px;" id="adminHint"></p>
  </div>

  <!-- 应用脚本 -->
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
